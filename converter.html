<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CSV → JSON 変換ツール（OrgChart用）</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 20px;
      line-height: 1.6;
    }
    textarea {
      width: 100%;
      height: 200px;
      font-family: monospace;
      box-sizing: border-box;
    }
    pre {
      background: #f5f5f5;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    button {
      padding: 8px 16px;
      margin: 10px 0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>CSV → JSON 変換ツール（OrgChart用）</h1>

  <p>① 下のテキストエリアに CSV を貼り付けてね（1行目はヘッダー）</p>
  <p>　例：<code>id,pid,name,title,desc,img</code></p>

  <textarea id="csvInput" placeholder="ここに CSV を貼り付けてね"></textarea>

  <br>
  <button id="convertBtn">JSON に変換する</button>

  <h2>出力 JSON（a.json 用）</h2>
  <pre id="jsonOutput"></pre>

  <script>
    document.getElementById("convertBtn").addEventListener("click", () => {
      const csv = document.getElementById("csvInput").value.trim();
      if (!csv) {
        alert("CSV を貼り付けてね！");
        return;
      }

      const lines = csv.split(/\r?\n/);
      const headers = lines[0].split(",").map(h => h.trim());

      const result = [];

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        // シンプルな CSV パーサ（カンマとダブルクォート対応）
        const cols = [];
        let current = "";
        let inQuotes = false;

        for (let j = 0; j < line.length; j++) {
          const ch = line[j];
          if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === "," && !inQuotes) {
            cols.push(current);
            current = "";
          } else {
            current += ch;
          }
        }
        cols.push(current);

        const row = {};
        headers.forEach((h, idx) => {
          row[h] = (cols[idx] !== undefined ? cols[idx].trim() : "");
        });

        // OrgChart 用に型を整える
        const obj = {
          id: row.id ? Number(row.id) : null,
          pid: row.pid ? Number(row.pid) : null,
          name: row.name || "",
          title: row.title || "",
          desc: row.desc || "",
          img: row.img || ""
        };

        result.push(obj);
      }

      const jsonText = JSON.stringify(result, null, 2);
      document.getElementById("jsonOutput").textContent = jsonText;
    });
  </script>
</body>
</html>
