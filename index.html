<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テスト</title>

<!-- 🔥 これが最重要 -->
<script src="https://balkan.app/js/FamilyTree.js"></script>

</head>

<body>

<h2>テスト家系図</h2>

<!-- 🔥 高さ必須 -->
<div id="tree" style="width:100%; height:600px; border:1px solid #000;"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const nodes = [
        { id: 1, name: "父" },
        { id: 100, name: "母（ダミー）" },
    
        { id: 2, name: "子", fid: 1, mid: 100 }
    ];

    new FamilyTree(document.getElementById("tree"), {
        nodes: nodes,
        nodeBinding: {
            field_0: "name"
        },

        // 🔥 これだけ追加
        layout: FamilyTree.layout.tree
    });

});
</script>

</body>
</html>
