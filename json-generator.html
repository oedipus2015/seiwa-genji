<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>OrgChart用 JSON 編集・生成ツール</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
    th, td { border: 1px solid #ccc; padding: 4px 6px; font-size: 13px; }
    th { background: #f5f5f5; }
    input, textarea { width: 100%; box-sizing: border-box; font-size: 12px; }
    textarea { height: 80px; resize: vertical; }
    button { padding: 6px 12px; margin: 4px 4px 12px 0; cursor: pointer; }
    pre { background: #f5f5f5; padding: 10px; white-space: pre-wrap; font-size: 12px; }
  </style>
</head>
<body>

<h1>OrgChart用 JSON 編集・生成ツール</h1>

<button id="loadJsonBtn">既存 JSON を読み込む</button>
<input type="file" id="jsonFileInput" accept=".json" style="display:none">

<button id="addRowBtn">＋ 行を追加</button>
<button id="clearRowsBtn">全行クリア</button>

<table id="dataTable">
  <thead>
    <tr>
      <th style="width:60px;">id</th>
      <th style="width:60px;">pid</th>
      <th style="width:140px;">name</th>
      <th style="width:180px;">title</th>
      <th>desc</th>
      <th style="width:180px;">img</th>
      <th style="width:60px;">削除</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<button id="generateJsonBtn">JSON を生成</button>

<h2>生成された JSON（seiwa-genji.json 用）</h2>
<pre id="jsonOutput"></pre>

<button id="downloadJsonBtn">seiwa-genji.json としてダウンロード</button>

<script>
  const tbody = document.querySelector("#dataTable tbody");
  const addRowBtn = document.getElementById("addRowBtn");
  const clearRowsBtn = document.getElementById("clearRowsBtn");
  const generateJsonBtn = document.getElementById("generateJsonBtn");
  const jsonOutput = document.getElementById("jsonOutput");
  const downloadJsonBtn = document.getElementById("downloadJsonBtn");

  const loadJsonBtn = document.getElementById("loadJsonBtn");
  const jsonFileInput = document.getElementById("jsonFileInput");

  function createRow(defaults = {}) {
    const tr = document.createElement("tr");
    const fields = ["id", "pid", "name", "title", "desc", "img"];

    fields.forEach(field => {
      const td = document.createElement("td");
      let el;
      if (field === "desc") el = document.createElement("textarea");
      else { el = document.createElement("input"); el.type = "text"; }
      el.value = defaults[field] ?? "";
      el.dataset.field = field;
      td.appendChild(el);
      tr.appendChild(td);
    });

    const tdDel = document.createElement("td");
    const delBtn = document.createElement("button");
    delBtn.textContent = "削除";
    delBtn.onclick = () => tr.remove();
    tdDel.appendChild(delBtn);
    tr.appendChild(tdDel);

    tbody.appendChild(tr);
  }

  addRowBtn.onclick = () => createRow();

  clearRowsBtn.onclick = () => {
    if (confirm("全ての行を削除しますか？")) tbody.innerHTML = "";
  };

  generateJsonBtn.onclick = () => {
    const rows = [...tbody.querySelectorAll("tr")];
    const result = rows.map(tr => {
      const obj = {};
      tr.querySelectorAll("input, textarea").forEach(el => {
        obj[el.dataset.field] = el.value.trim();
      });
      return {
        id: obj.id ? Number(obj.id) : null,
        pid: obj.pid ? Number(obj.pid) : null,
        name: obj.name || "",
        title: obj.title || "",
        desc: obj.desc || "",
        img: obj.img || ""
      };
    });
    jsonOutput.textContent = JSON.stringify(result, null, 2);
  };

  downloadJsonBtn.onclick = () => {
    const text = jsonOutput.textContent.trim();
    if (!text) return alert("まず JSON を生成してね。");
    const blob = new Blob([text], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "seiwa-genji.json";
    a.click();
  };

  loadJsonBtn.onclick = () => jsonFileInput.click();

  jsonFileInput.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const data = JSON.parse(reader.result);
      tbody.innerHTML = "";
      data.forEach(item => createRow(item));
    };
    reader.readAsText(file);
  };
</script>

</body>
</html>
